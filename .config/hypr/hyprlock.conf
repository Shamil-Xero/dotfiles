general {
    grace = 2
    hide_cursor = true
}

background {
    path = screenshot
    blur_passes = 3
    blur_size = 10
    noise = 0.01
    contrast = 1.2
    brightness = 0.9
    vibrancy = 0.2
}

# 🔵 Clock (center)
label {
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    font_size = 80
    font_family = JetBrains Mono Nerd Font
    position = 0, 120
    halign = center
    valign = center
    color = rgba(255, 255, 255, 0.9)
}

# 📅 Date (below clock)
label {
    text = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
    font_size = 20
    font_family = JetBrains Mono Nerd Font
    position = 0, 50
    halign = center
    valign = center
    color = rgba(200, 200, 200, 0.8)
}

# 🔐 Input field (glass style)
input-field {
    size = 300, 55
    position = 0, -80

    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgba(255, 255, 255, 0.2)
    inner_color = rgba(30, 30, 30, 0.4)
    font_color = rgba(255, 255, 255, 1)

    fade_on_empty = false
    placeholder_text = <i>Enter Password...</i>

    rounding = 12
    shadow_passes = 2
}

# Username
label {
    text = #Hello Shamil
    font_size = 18
    font_family = JetBrains Mono Nerd Font
    position = 0, -140
    halign = center
    valign = center
    color = rgba(220, 220, 220, 0.8)
}
